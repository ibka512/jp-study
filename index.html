<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="logo.png">
<link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      console.log('Service Worker 注册成功');
    });
  }
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>钟摆日语 - 乱序版</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@600;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet" />

<script>
  window.MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
    chtml: { scale: 1.1 } 
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="toast" class="toast"></div>

<div class="app-container">
  
  <div id="setup-area">
    <div class="header-area">
      <div class="header-titles">
        <h2><span class="material-symbols-rounded" style="color:var(--tertiary); font-size:1.8rem;">local_florist</span> 钟摆日语</h2>
      </div>
      <button class="icon-btn theme-toggle-btn" style="box-shadow: none;"><span class="material-symbols-rounded theme-icon">light_mode</span></button>
    </div>

    <div class="card-panel" id="stats-panel">
      <div class="stats-grid">
  <div class="stat-item"><div class="stat-number" id="total-days">0</div><div class="stat-label">学习天数</div></div>
  <div class="stat-item"><div class="stat-number" id="streak-days">0</div><div class="stat-label">连续打卡</div></div>
  <div class="stat-item stat-item-wide"><div class="stat-number" id="srs-due-count">0</div><div class="stat-label">待复习词</div></div>
</div>
    </div>

    <div class="card-panel">
      <button id="btn-enter-wb" style="margin-bottom: 32px; background: var(--tertiary); color: var(--on-primary); font-size: 1.15rem; padding: 20px;" class="icon-text-gap">
        <span class="material-symbols-rounded" style="font-size:1.4rem;">view_cozy</span> 全景词库
      </button>

      <div class="custom-select-wrapper" style="margin-bottom: 24px;">
        <select id="group-select" style="display:none;"></select>
      </div>

      <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--outline); padding-bottom: 12px; margin-bottom: 20px;">
        <h3 style="margin: 0; border: none; padding: 0;">
          <span class="material-symbols-rounded">rocket_launch</span> 学习模式
        </h3>
        <div style="display: flex; gap: 8px;">
          <button id="btn-vol-nav-toggle" class="icon-btn" style="width: 40px; height: 40px; box-shadow: none; border-color: var(--outline); background: var(--surface-container); color: var(--on-surface); opacity: 0.5;" title="音量键翻页开关">
            <span class="material-symbols-rounded" id="vol-nav-icon">swap_vert</span>
          </button>
          <button id="btn-auto-speak-toggle" class="icon-btn" style="width: 40px; height: 40px; box-shadow: none; border-color: var(--outline); background: var(--surface-container); color: var(--primary);" title="自动朗读开关">
            <span class="material-symbols-rounded" id="auto-speak-icon">volume_up</span>
          </button>
        </div>
      </div>
      
      <button id="btn-start-srs" class="btn-srs icon-text-gap" style="margin-bottom: 16px; font-size: 1.1rem; padding: 18px; white-space: nowrap;">
        <span class="material-symbols-rounded">psychology</span> 智能复习 (SRS)
      </button>
      
      <div class="flex-row" style="margin-bottom: 8px; flex-wrap: wrap; gap: 12px;">
        <button id="btn-start-pendulum" style="flex: 1 1 40%; margin-bottom: 0; white-space: nowrap; padding: 16px 8px;" class="icon-text-gap">
            <span class="material-symbols-rounded">directions_run</span> 经典突击
        </button>
        <button id="btn-start-dual-track" style="flex: 1 1 40%; background: var(--accent-red); color: var(--on-primary); margin-bottom: 0; white-space: nowrap; padding: 16px 8px;" class="icon-text-gap">
            <span class="material-symbols-rounded">swords</span> 闯关模式
        </button>
        <button id="btn-start-rote-learning" style="flex: 1 1 40%; background: var(--tertiary); color: var(--on-primary); margin-bottom: 0; white-space: nowrap; padding: 16px 8px;" class="icon-text-gap">
            <span class="material-symbols-rounded">menu_book</span> 死记硬背
        </button>
        <button id="btn-start-memory-test" style="flex: 1 1 40%; background: var(--on-surface); color: var(--surface); margin-bottom: 0; white-space: nowrap; padding: 16px 8px;" class="icon-text-gap">
            <span class="material-symbols-rounded">quiz</span> 记忆检测
        </button>
      </div>
      
      <button id="btn-long-press" class="btn-long-press">
        <div class="lp-bg"></div>
        <span class="lp-text"><span class="material-symbols-rounded" style="font-size:1.6rem;">fingerprint</span> 长按打卡</span>
      </button>

    </div>
  </div>

  <div id="study-area" class="hidden">
    <div class="flex-row" id="study-top-bar" style="justify-content: space-between; margin-bottom: 20px; align-items: center; padding: 0 8px;">
      <button id="btn-exit-study" class="btn-small btn-outline icon-text-gap" style="border: none; font-size: 1.05rem; padding: 12px 16px; margin: -12px -12px -12px -16px; width: auto; color: var(--on-surface); opacity: 0.7; box-shadow: none; font-weight: 700;">
          <span class="material-symbols-rounded">chevron_left</span> 退出
      </button>
      <div style="display: flex; align-items: center; gap: 16px;">
        <select id="next-display-mode" style="display:none;">
          <option value="all">全显</option><option value="word">汉字</option><option value="kana">假名</option><option value="meaning">释义</option>
        </select>
        <span id="progress-text" style="font-size: 0.95rem; font-weight: 700; opacity: 0.7;">0 / 0</span>
        <button class="icon-btn theme-toggle-btn" style="width: 40px; height: 40px; font-size: 1.3rem; box-shadow: none; border: 2px solid var(--outline); margin: 0; transform: none;">
            <span class="material-symbols-rounded theme-icon">light_mode</span>
        </button>
      </div>
    </div>
    
    <div id="pixel-matrix"></div>
    
    <div id="srs-progress-container" class="hidden">
        <div id="srs-progress-bar"></div>
        <div id="srs-progress-glow"></div>
    </div>
    
    <div class="flash-card" id="flash-card">
      <div class="watermark-layer"><div id="flash-watermark" class="watermark"></div></div>
      <div id="btn-speaker" class="speaker-icon"><span class="material-symbols-rounded">volume_up</span></div>
      <div id="star-btn" class="star-btn"><span class="material-symbols-rounded" id="star-icon">star</span></div>
      <div class="word-main blur-target" id="w-word">单词</div>
      <div class="info-row-group"><div class="kana-row blur-target" id="w-kana">假名</div><div class="type-row blur-target" id="w-type"></div><div class="meaning-row blur-target" id="w-meaning">释义</div></div>
      <div class="dt-example-box blur-target" id="w-example-box" style="cursor: pointer;"></div>
    </div>
    
    <div id="dual-track-ui" class="hidden">
      <div id="dt-spell-area" class="hidden"><div id="dt-spell-input" class="dt-spell-input-box"></div><div id="dt-spell-keyboard" class="dt-spell-keyboard"></div></div>
      <div id="dt-choice-area" class="hidden"><div id="dt-choice-buttons"></div></div>
    </div>

    <div id="memory-test-ui" class="hidden" style="margin-bottom: 24px;">
      <div id="mt-warning" class="hidden" style="text-align: center; color: var(--accent-red); font-weight: 700; padding: 24px; border: 2px dashed var(--accent-red); border-radius: var(--small-radius); margin: 0 16px;">
        <span class="material-symbols-rounded" style="font-size: 2.5rem; margin-bottom: 12px;">visibility_off</span><br>全显模式下无法进行检测<br><span style="font-size:0.85rem; opacity:0.8; display:inline-block; margin-top:8px;">请在上方切换「汉字/假名/释义」<br>作为掩盖检测项</span>
      </div>
      <div id="mt-spell-area" class="hidden"><div id="mt-spell-input" class="dt-spell-input-box"></div><div id="mt-spell-keyboard"></div></div>
      <div id="mt-choice-area" class="hidden"><div id="mt-choice-buttons"></div></div>
    </div>

    <div id="capsule-pendulum" class="action-grid-2 hidden">
      <button id="btn-prev" class="btn-action"><span class="material-symbols-rounded">arrow_back</span><span>上一个</span></button>
      <button id="btn-next" class="btn-action"><span class="material-symbols-rounded">arrow_forward</span><span>下一个</span></button>
      <button id="btn-finish" class="btn-action" style="display: none;"><span class="material-symbols-rounded">task_alt</span><span>完成打卡</span></button>
    </div>

    <div id="capsule-srs" class="action-grid-2 hidden">
      <button id="srs-again" class="btn-action btn-srs-again">忘记<div class="srs-time">1分钟</div></button>
      <button id="srs-hard" class="btn-action btn-srs-hard">模糊<div class="srs-time" id="time-hard">1天</div></button>
      <button id="srs-good" class="btn-action btn-srs-good">认识<div class="srs-time" id="time-good">3天</div></button>
      <button id="srs-easy" class="btn-action btn-srs-easy">熟练<div class="srs-time" id="time-easy">5天</div></button>
    </div>
  </div>

  <div id="wordbank-area">
    <div class="wb-header">
      <button id="btn-exit-wb" class="btn-small btn-outline icon-text-gap" style="border: none; font-size: 1.05rem; padding: 12px 16px; margin: -12px -12px -12px -16px; box-shadow: none; font-weight: 700; z-index: 2;">
          <span class="material-symbols-rounded">chevron_left</span> 返回
      </button>
      <div class="wb-title-center">全景词库</div>
      <div style="display: flex; gap: 8px; align-items: center; z-index: 2;">
        <button id="wb-manage-toggle" class="btn-small btn-outline icon-text-gap" style="border-color: var(--primary); color: var(--primary); margin: 0; box-shadow: none;"><span class="material-symbols-rounded" style="font-size:1.1rem;">edit</span></button>
        <button id="wb-batch-toggle" class="btn-small btn-outline icon-text-gap" style="border-color: var(--tertiary); color: var(--tertiary); margin: 0; box-shadow: none;"><span class="material-symbols-rounded" style="font-size:1.1rem;">checklist</span></button>
      </div>
    </div>
    
    <div class="flex-row" style="justify-content: space-between; margin-bottom: 24px; flex-wrap: nowrap; gap: 12px;">
      <div class="custom-select-wrapper" style="flex: 1;">
          <select id="wb-folder-filter" style="display:none;"></select>
      </div>
      <button id="btn-view-settings" class="icon-btn" style="width: 48px; height: 48px; color: var(--primary); border-color: var(--primary); background: transparent;" title="视图与排版设置">
          <span class="material-symbols-rounded">pageview</span>
      </button>
    </div>

    <div class="card-panel" style="margin-bottom: 24px; border-radius: var(--card-radius);">
      <h3 style="margin-bottom: 16px;"><span class="material-symbols-rounded">folder_managed</span> 文件夹与导入管理</h3>
      <div class="flex-row" style="margin-bottom: 16px;">
         <button id="btn-new-folder" class="btn-outline icon-text-gap" style="flex: 1; border-color: var(--tertiary); color: var(--tertiary); padding: 12px;"><span class="material-symbols-rounded" style="font-size:1.2rem;">create_new_folder</span> 建夹</button>
         <button id="btn-del-folder" class="btn-outline icon-text-gap" style="flex: 1; border-color: var(--accent-red); color: var(--accent-red); padding: 12px;" title="删除当前文件夹"><span class="material-symbols-rounded" style="font-size:1.2rem;">delete</span> 删夹</button>
      </div>
      <textarea id="custom-input" placeholder="格式：单词,假名,词性,释义,例句(可选)&#10;用逗号或Tab分隔"></textarea>
      <button id="btn-import" style="background: var(--tertiary); color: var(--on-primary); margin-bottom: 20px;">导入新词</button>
      <button id="btn-reset" class="btn-outline" style="border-color: var(--accent-red); color: var(--accent-red);">恢复内置词汇</button>
    </div>

    <select id="wb-col-select" style="display:none;" class="no-bs">
        <option value="2">2</option> <option value="3" selected>3</option> <option value="4">4</option>
    </select>
    <select id="wb-blur-select" style="display:none;" class="no-bs">
        <option value="all">all</option> <option value="word">word</option> <option value="kana">kana</option> <option value="meaning">meaning</option>
    </select>

    <div id="wb-grid-container">
      <div id="wb-grid" data-cols="3"></div>
      <div id="wb-scroll-sentinel" class="loading-dots" style="display: none;"><div></div><div></div><div></div></div> 
    </div>
  </div>
</div>

<div id="bs-overlay" class="modal-overlay">
    <div class="bottom-sheet">
        <div class="bs-handle"></div>
        <div class="bs-scrollable-content">
            <h3 id="bs-title">请选择</h3>
            <div id="bs-options" class="bs-options"></div>
        </div>
    </div>
</div>

<div id="view-settings-overlay" class="modal-overlay">
    <div class="bottom-sheet">
        <div class="bs-handle"></div>
        <div class="bs-scrollable-content">
            <h3 style="text-align:center; margin-bottom: 24px; border:none; justify-content:center; color: var(--on-surface);">视图与排版设置</h3>
            <div style="font-size:0.95rem; font-weight:800; margin-bottom:12px; color:var(--primary);">视图列数</div>
            <div class="flex-row" style="gap:12px; margin-bottom: 28px; flex-wrap: nowrap;">
                <button class="vs-col-btn vs-btn selected" data-val="3" style="flex:1;">3列</button>
                <button class="vs-col-btn vs-btn" data-val="2" style="flex:1;">2列</button>
                <button class="vs-col-btn vs-btn" data-val="4" style="flex:1;">4列</button>
            </div>
            <div style="font-size:0.95rem; font-weight:800; margin-bottom:12px; color:var(--primary);">列表遮盖模式</div>
            <div class="flex-row" style="gap:12px; flex-wrap:wrap;">
                <button class="vs-blur-btn vs-btn selected" data-val="all" style="flex:1 1 40%;">全显 (无遮盖)</button>
                <button class="vs-blur-btn vs-btn" data-val="meaning" style="flex:1 1 40%;">仅显释义</button>
                <button class="vs-blur-btn vs-btn" data-val="word" style="flex:1 1 40%;">仅显汉字</button>
                <button class="vs-blur-btn vs-btn" data-val="kana" style="flex:1 1 40%;">仅显假名</button>
            </div>
        </div>
    </div>
</div>

<div id="dialog-overlay" class="modal-overlay">
    <div class="dialog-content">
        <h3 id="dialog-title" style="border:none; margin-bottom:12px; justify-content:center;">提示</h3>
        <p id="dialog-msg" style="font-size:1rem; opacity:0.8; margin-bottom:24px; line-height:1.5;">内容</p>
        <div class="flex-row" style="margin-bottom:0;">
            <button id="dialog-confirm" style="flex:1;">确定</button>
            <button id="dialog-cancel" class="btn-outline" style="flex:1;">取消</button>
        </div>
    </div>
</div>

<div id="prompt-overlay" class="modal-overlay">
    <div class="dialog-content">
        <h3 id="prompt-title" style="border:none; margin-bottom:16px; justify-content:center;">输入</h3>
        <input type="text" id="prompt-input" style="text-align:center; font-weight:700; border-radius: 999px;" />
        <div class="flex-row" style="margin-bottom:0;">
            <button id="prompt-confirm" style="flex:1;">确定</button>
            <button id="prompt-cancel" class="btn-outline" style="flex:1;">取消</button>
        </div>
    </div>
</div>

<div id="edit-overlay" class="modal-overlay">
    <div class="dialog-content edit-modal-content">
        <h3 style="border:none; margin-bottom:20px; justify-content:center;"><span class="material-symbols-rounded">edit_square</span> 编辑单词</h3>
        <div class="edit-input-group"><label>单词</label><input type="text" id="edit-word"></div>
        <div class="edit-input-group"><label>假名</label><input type="text" id="edit-kana"></div>
        <div class="edit-input-group"><label>词性</label><input type="text" id="edit-type"></div>
        <div class="edit-input-group"><label>释义</label><input type="text" id="edit-meaning"></div>
        <div class="flex-row" style="margin-top: 24px; margin-bottom: 0;">
            <button id="btn-save-edit" style="flex: 1; background: var(--tertiary);">保存修改</button>
            <button id="btn-cancel-edit" class="btn-outline" style="flex: 1;">放弃</button>
        </div>
    </div>
</div>

<div id="move-overlay" class="modal-overlay">
  <div class="move-modal-content">
    <h3 style="border: none; padding: 0; margin-bottom: 20px; justify-content:center;"><span class="material-symbols-rounded">move_item</span> 移动至文件夹</h3>
    <select id="move-dest-select" style="display:none;"></select>
    <div class="flex-row" style="margin-bottom: 0;">
      <button id="btn-confirm-move" style="flex: 1;">确认移动</button>
      <button id="btn-cancel-move" class="btn-outline" style="flex: 1;">取消</button>
    </div>
  </div>
</div>

<div id="detail-overlay" class="modal-overlay">
  <div class="detail-card-container" id="detail-card-container">
    <div class="watermark-layer"><div id="dt-watermark" class="watermark"></div></div>
    <div id="detail-close"><span class="material-symbols-rounded">close</span></div>
    <button class="detail-nav-btn" id="detail-prev"><span class="material-symbols-rounded">chevron_left</span></button>
    <button class="detail-nav-btn" id="detail-next"><span class="material-symbols-rounded">chevron_right</span></button>
    <div id="dt-anim-wrapper" class="detail-anim-wrapper">
      <div class="dt-word" id="dt-word">单词</div>
      <div class="info-row-group"><div class="dt-kana" id="dt-kana">假名</div><div class="dt-type" id="dt-type"></div><div class="dt-mean" id="dt-mean">释义</div></div>
      <div class="dt-example-box" id="dt-example-box"></div>
    </div>
  </div>
</div>

<div id="batch-bar" class="batch-bar" style="display: none;">
  <span class="batch-count">已选 <span id="batch-count-num">0</span> 词</span>
  <div style="display: flex; gap: 10px;">
    <button id="btn-batch-move" class="icon-text-gap"><span class="material-symbols-rounded" style="font-size:1.2rem;">move_item</span> 移动</button>
    <button id="btn-batch-del" style="background: var(--accent-red); color: var(--on-primary);" class="icon-text-gap"><span class="material-symbols-rounded" style="font-size:1.2rem;">delete</span> 删除</button>
    <button id="btn-batch-cancel" class="btn-outline" style="border: 2px solid var(--outline); box-shadow: none;">取消</button>
  </div>
</div>

<script src="data.js"></script> 
<script src="app.js"></script>

</body>
</html>
